############################################
# LOCAL-PROD PROFILE — API GATEWAY
# Real Redis, real Eureka, real resilience config.
# Run with: -Dspring.profiles.active=local-prod
############################################

server:
  port: 8762

spring:
  main:
    allow-bean-definition-overriding: true  # Allow overriding bean definitions

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s

eureka:
  instance:
    hostname: localhost                    # Register with localhost for local testing
    prefer-ip-address: false               # Use hostname instead of IP
  client:
    service-url:
      defaultZone: ${EUREKA_ZONE}
    enabled: true

############################################
# RESILIENCE (PRODUCTION-GRADE)
############################################

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true

    instances:
      default:
        baseConfig: default

      orderStrict:
        baseConfig: default
        failureRateThreshold: 40
        waitDurationInOpenState: 60s

      emailLenient:
        baseConfig: default
        failureRateThreshold: 60
        waitDurationInOpenState: 15s

  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - java.io.IOException
          - java.net.ConnectException

    instances:
      default:
        baseConfig: default

      orderStrict:
        baseConfig: default
        maxAttempts: 2
        waitDuration: 400ms

      emailLenient:
        baseConfig: default
        maxAttempts: 4
        waitDuration: 600ms

  bulkhead:
    instances:
      default:
        maxConcurrentCalls: 100
        maxWaitDuration: 0

      orderStrict:
        maxConcurrentCalls: 50
        maxWaitDuration: 0

      emailLenient:
        maxConcurrentCalls: 30
        maxWaitDuration: 0

  timelimiter:
    instances:
      default:
        timeoutDuration: 5s
        cancelRunningFuture: true

      orderStrict:
        timeoutDuration: 3s
        cancelRunningFuture: true

      emailLenient:
        timeoutDuration: 8s
        cancelRunningFuture: true

# ─────────────────────────────────────────────────────────────────────────────
# LOGGING: Production-level, but with DEBUG for gateway code (dev observability)
# ─────────────────────────────────────────────────────────────────────────────
logging:
  level:
    root: WARN           # Prod-like: WARN root level
    org.springframework: WARN
    org.springframework.cloud: INFO
    org.springframework.cloud.gateway: DEBUG  # Dev: Debug gateway routing
    com.ono: DEBUG       # Dev: Debug our code

############################################
# OBSERVABILITY — Production-grade with dev visibility
############################################

management:
  tracing:
    sampling:
      probability: 0.5  # Dev: sample 50% of traces for debugging (was 10%)

  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,threaddump,heapdump  # Dev: added dumps

  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

  metrics:
    export:
      prometheus:
        enabled: true

############################################
# SECURITY — RSA public key from AuthClient
############################################

security:
  jwt:
    public-key: ${AUTH_SERVICE_PUBLIC_KEY:}
    issuer: ${SECURITY_JWT_ISSUER:spozon-auth}
