eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

# application.yml for API Gateway (running on 8762)
server:
  port: 8762

spring:
  application:
    name: API-GATEWAY # Optional, but good practice

  config:
    import: optional:file:.env  # loads environment variables from .env

  security:
    jwt:
      secret: ${JWT_SECRET}

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  cloud:
    gateway:
      default-filters:
        # Adds correlation id if missing
        - AddRequestHeader=X-Gateway, API-GATEWAY
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"

      httpclient:
        connect-timeout: 3000
        response-timeout: 5s

      routes:

        # ------------------------------------------------------------------
        # Route 1: Authentication Service (PUBLIC)
        # ------------------------------------------------------------------
        - id: auth_service
          uri: lb://AUTHENTICATION-SERVICE
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /${segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
            - name: CircuitBreaker
              args:
                name: authServiceCB
                fallbackUri: forward:/fallback/auth

        # ------------------------------------------------------------------
        # Route 2: User Service (SECURED)
        # ------------------------------------------------------------------
        - id: user_service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /${segment}
            - name: AuthPreFilter
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/fallback/users

        # ------------------------------------------------------------------
        # Route 3: Restaurant Service (SECURED)
        # ------------------------------------------------------------------
        - id: restaurant_service
          uri: lb://RESTAURANT-SERVICE
          predicates:
            - Path=/api/restaurants/**
          filters:
            - RewritePath=/api/restaurants/(?<segment>.*), /${segment}
            - name: AuthPreFilter
            - name: CircuitBreaker
              args:
                name: restaurantServiceCB
                fallbackUri: forward:/fallback/restaurants

        # ------------------------------------------------------------------
        # Route 4: Order Service (SECURED)
        # ------------------------------------------------------------------
        - id: order_service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/orders/**
          filters:
            - RewritePath=/api/orders/(?<segment>.*), /${segment}
            - name: AuthPreFilter
            - name: CircuitBreaker
              args:
                name: orderServiceCB
                fallbackUri: forward:/fallback/orders

        # ------------------------------------------------------------------
        # Route 5: Notification Service (SECURED)
        # ------------------------------------------------------------------
        - id: notification_service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications/(?<segment>.*), /${segment}
            - name: AuthPreFilter
            - name: CircuitBreaker
              args:
                name: notificationServiceCB
                fallbackUri: forward:/fallback/notifications

        # ------------------------------------------------------------------
        # Route 6: Email Service (INTERNAL / SECURED)
        # ------------------------------------------------------------------
        - id: email_service
          uri: lb://EMAIL-SERVICE
          predicates:
            - Path=/api/emails/**
          filters:
            - RewritePath=/api/emails/(?<segment>.*), /${segment}
            - name: AuthPreFilter
            - name: CircuitBreaker
              args:
                name: emailServiceCB
                fallbackUri: forward:/fallback/emails

resilience4j:
  circuitbreaker:
    instances:
      authCB:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3

      userServiceCB:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3

      restaurantServiceCB:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3

      orderServiceCB:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3

      notificationServiceCB:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3

      emailServiceCB:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3

  timelimiter:
    instances:
      authServiceCB:
        timeoutDuration: 3s

      userServiceCB:
        timeoutDuration: 3s

      restaurantServiceCB:
        timeoutDuration: 3s

      orderServiceCB:
        timeoutDuration: 3s

      notificationServiceCB:
        timeoutDuration: 3s

      emailServiceCB:
        timeoutDuration: 3s

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO

ono:
  logging:
    exceptions:
      enabled: false
    performance:
      enabled: true
