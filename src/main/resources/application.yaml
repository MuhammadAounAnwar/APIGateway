# application.yml for API Gateway (running on 8762)
server:
  port: 8762

spring:
  application:
    name: API-GATEWAY # Optional, but good practice

  cloud:
    gateway:
      routes:
        # ------------------------------------------------------------------
        # Route 1: AuthClient (Public/Unsecured Endpoints)
        # ------------------------------------------------------------------
        - id: auth_route
          uri: lb://AUTH-CLIENT
          predicates:
            # 1. The Predicate list item must be indented and standalone
            - Path=/auth/** # <--- CORRECT: The list item ends here
          filters: # <--- CORRECT: The 'filters' keyword is now a peer to 'predicates'
            # 2. The Filter list items must be indented under 'filters'
            - RewritePath=/auth/(?<remaining>.*), /${remaining}

        # ------------------------------------------------------------------
        # Route 2: UserClient (Secured Endpoints)
        # ------------------------------------------------------------------
        - id: user_route
          uri: lb://USER-CLIENT
          predicates:
            - Path=/user/**
          filters: # <--- Apply the correction here
            - RewritePath=/user/(?<remaining>.*), /${remaining}
#            - name: AuthPreFilter # This is correct for calling a custom filter
        
        # ------------------------------------------------------------------
        # Route 3: RestaurantClient
        # ------------------------------------------------------------------
        - id: restaurant_route
          uri: lb://RESTAURANT-CLIENT
          predicates:
            - Path=/restaurants/**
          filters:
            - RewritePath=/restaurants/(?<remaining>.*), /${remaining}

        # ------------------------------------------------------------------
        # Route 4: OrderClient
        # ------------------------------------------------------------------
        - id: order_route
          uri: lb://ORDER-CLIENT
          predicates:
            - Path=/orders/**
          filters:
            - RewritePath=/orders/(?<remaining>.*), /${remaining}

        # NOTE: Oauth2 Client often acts as a dedicated backend service for token issuance/validation, 
        # so its routes would be configured here if it exposes direct endpoints.