server:
  port: 8762
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

spring:
  application:
    name: api-gateway

  config:
    import: optional:file:.env

  cloud:
    gateway:
      default-filters:
        # Reject payloads larger than 10 MB at the gateway edge
        - name: RequestSize
          args:
            maxSize: 10MB
        - AddRequestHeader=X-Gateway, API-GATEWAY
        - AddResponseHeader=X-Gateway-Version, v1
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - RemoveResponseHeader=Server

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:3000"
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      routes:

        # ------------------------------------------------------------------
        # API Docs Aggregation Routes (proxy downstream /v3/api-docs through gateway)
        # These are public — no auth needed to browse API documentation.
        # ------------------------------------------------------------------
        - id: docs_auth_service
          uri: lb://AUTH-CLIENT
          predicates:
            - Path=/gateway-api-docs/auth-service
          filters:
            - RewritePath=/gateway-api-docs/auth-service, /v3/api-docs

        - id: docs_user_service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/gateway-api-docs/user-service
          filters:
            - RewritePath=/gateway-api-docs/user-service, /v3/api-docs

        - id: docs_restaurant_service
          uri: lb://RESTAURANT-SERVICE
          predicates:
            - Path=/gateway-api-docs/restaurant-service
          filters:
            - RewritePath=/gateway-api-docs/restaurant-service, /v3/api-docs

        - id: docs_order_service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/gateway-api-docs/order-service
          filters:
            - RewritePath=/gateway-api-docs/order-service, /v3/api-docs

        - id: docs_notification_service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/gateway-api-docs/notification-service
          filters:
            - RewritePath=/gateway-api-docs/notification-service, /v3/api-docs

        # ------------------------------------------------------------------
        # Route 1: Authentication Service (PUBLIC)
        # ------------------------------------------------------------------
        - id: auth_service
          uri: lb://AUTH-CLIENT
          predicates:
            - Path=/api/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${AUTH_RATE_LIMIT:10}
                redis-rate-limiter.burstCapacity: ${AUTH_BURST_CAPACITY:20}
            - name: Retry
              args:
                name: default
            - name: CircuitBreaker
              args:
                name: default
                fallbackUri: forward:/fallback/auth-service

        # ------------------------------------------------------------------
        # Route 2: User Service (SECURED)
        # ------------------------------------------------------------------
        - id: user_service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /${segment}
            - name: AuthPreFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${USER_RATE_LIMIT:20}
                redis-rate-limiter.burstCapacity: ${USER_BURST_CAPACITY:40}
            - name: Retry
              args:
                name: default
            - name: TimeLimiter
              args:
                name: default
            - name: Bulkhead
              args:
                name: default
            - name: CircuitBreaker
              args:
                name: default
                fallbackUri: forward:/fallback/user-service

        # ------------------------------------------------------------------
        # Route 3: Restaurant Service (SECURED)
        # ------------------------------------------------------------------
        - id: restaurant_service
          uri: lb://RESTAURANT-SERVICE
          predicates:
            - Path=/api/restaurants/**
          filters:
            - RewritePath=/api/restaurants/(?<segment>.*), /${segment}
            - name: AuthPreFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RESTAURANT_RATE_LIMIT:30}
                redis-rate-limiter.burstCapacity: ${RESTAURANT_BURST_CAPACITY:60}
            - name: Retry
              args:
                name: default
            - name: TimeLimiter
              args:
                name: default
            - name: Bulkhead
              args:
                name: default
            - name: CircuitBreaker
              args:
                name: default
                fallbackUri: forward:/fallback/restaurant-service

        # ------------------------------------------------------------------
        # Route 4: Order Service (SECURED)
        # ------------------------------------------------------------------
        - id: order_service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/orders/**
          filters:
            - RewritePath=/api/orders/(?<segment>.*), /${segment}
            - name: AuthPreFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${ORDER_RATE_LIMIT:15}
                redis-rate-limiter.burstCapacity: ${ORDER_BURST_CAPACITY:30}
            - name: Retry
              args:
                name: orderStrict
            - name: TimeLimiter
              args:
                name: orderStrict
            - name: Bulkhead
              args:
                name: orderStrict
            - name: CircuitBreaker
              args:
                name: orderStrict
                fallbackUri: forward:/fallback/order-service

        # ------------------------------------------------------------------
        # Route 5a: Guest Device Registration (PUBLIC — App Check enforced)
        # ------------------------------------------------------------------
        - id: guest_device_service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/v1/guest/**
          filters:
            - name: AuthPreFilter

        # ------------------------------------------------------------------
        # Route 5b: Notification Service (SECURED)
        # ------------------------------------------------------------------
        - id: notification_service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: AuthPreFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${NOTIFICATION_RATE_LIMIT:25}
                redis-rate-limiter.burstCapacity: ${NOTIFICATION_BURST_CAPACITY:50}
            - name: Retry
              args:
                name: default
            - name: TimeLimiter
              args:
                name: default
            - name: Bulkhead
              args:
                name: default
            - name: CircuitBreaker
              args:
                name: default
                fallbackUri: forward:/fallback/notification-service

        # ------------------------------------------------------------------
        # Route 6: Email Service (INTERNAL / SECURED)
        # ------------------------------------------------------------------
        - id: email_service
          uri: lb://EMAIL-SERVICE
          predicates:
            - Path=/api/mails/**
          filters:
            - name: AuthPreFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${EMAIL_RATE_LIMIT:2}
                redis-rate-limiter.burstCapacity: ${EMAIL_BURST_CAPACITY:5}
            - name: Retry
              args:
                name: default
            - name: TimeLimiter
              args:
                name: emailLenient
            - name: Bulkhead
              args:
                name: emailLenient
            - name: CircuitBreaker
              args:
                name: emailLenient
                fallbackUri: forward:/fallback/email-service

        # ------------------------------------------------------------------
        # Route 6b: Notification Service — user-facing v1 paths (SECURED)
        # FCM token registration, user notification feed — JWT auth via Gateway.
        # Must come before the /api/v1/** Pickleplay catch-all.
        # ------------------------------------------------------------------
        - id: notification_service_v1
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - name: AuthPreFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${NOTIFICATION_RATE_LIMIT:25}
                redis-rate-limiter.burstCapacity: ${NOTIFICATION_BURST_CAPACITY:50}

        # ------------------------------------------------------------------
        # Route 7: Chat Service REST (SECURED)
        # ------------------------------------------------------------------
        - id: chat_service
          uri: lb://CHAT-SERVICE
          predicates:
            - Path=/api/v1/chat/**
          filters:
            - name: AuthPreFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${CHAT_RATE_LIMIT:50}
                redis-rate-limiter.burstCapacity: ${CHAT_BURST_CAPACITY:100}
            - name: Retry
              args:
                name: default
            - name: TimeLimiter
              args:
                name: default
            - name: Bulkhead
              args:
                name: default
            - name: CircuitBreaker
              args:
                name: default
                fallbackUri: forward:/fallback/chat-service

        # ------------------------------------------------------------------
        # Route 8: Chat Service WebSocket (SECURED)
        # ------------------------------------------------------------------
        - id: chat_service_ws
          uri: lb://CHAT-SERVICE
          predicates:
            - Path=/ws/chat/**
          filters:
            - name: AuthPreFilter

        # ------------------------------------------------------------------
        # Route 8a: PicklePlay Backend API Docs (PUBLIC)
        # ------------------------------------------------------------------
        - id: docs_picklplay_backend
          uri: lb://PICKLPLAY-BACKEND
          predicates:
            - Path=/gateway-api-docs/picklplay-backend
          filters:
            - RewritePath=/gateway-api-docs/picklplay-backend, /v3/api-docs

        # ------------------------------------------------------------------
        # Route 8b: PicklePlay Backend — all feature domains (SECURED)
        # Chat service route above takes priority for /api/v1/chat/** paths.
        # ------------------------------------------------------------------
        - id: picklplay_backend
          uri: lb://PICKLPLAY-BACKEND
          predicates:
            - Path=/api/v1/**
          filters:
            - name: AuthPreFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${PICKLPLAY_RATE_LIMIT:30}
                redis-rate-limiter.burstCapacity: ${PICKLPLAY_BURST_CAPACITY:60}
            - name: Retry
              args:
                name: default
            - name: TimeLimiter
              args:
                name: default
            - name: Bulkhead
              args:
                name: default
            - name: CircuitBreaker
              args:
                name: default
                fallbackUri: forward:/fallback/picklplay-backend

        # ------------------------------------------------------------------
        # Route 9: Spozon Backend — user sub-paths
        # ------------------------------------------------------------------
        - id: spozon_user_paths
          uri: lb://SPOZON-BACKEND
          predicates:
            - Path=/api/users/me/matches/**,/api/users/me/analytics,/api/users/me/achievements,/api/users/me/bookings/**
          filters:
            - name: AuthPreFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${SPOZON_RATE_LIMIT:30}
                redis-rate-limiter.burstCapacity: ${SPOZON_BURST_CAPACITY:60}
            - name: CircuitBreaker
              args:
                name: default
                fallbackUri: forward:/fallback/spozon-backend

        # ------------------------------------------------------------------
        # Route 10: Spozon Backend — all feature domains (SECURED)
        # ------------------------------------------------------------------
        - id: spozon_backend
          uri: lb://SPOZON-BACKEND
          predicates:
            - Path=/api/venues/**,/api/bookings/**,/api/games/**,/api/matches/**,/api/tournaments/**,/api/coaches/**,/api/dashboard,/api/dashboard/**,/api/leaderboard,/api/leaderboard/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${SPOZON_RATE_LIMIT:30}
                redis-rate-limiter.burstCapacity: ${SPOZON_BURST_CAPACITY:60}
            - name: Retry
              args:
                name: default
            - name: TimeLimiter
              args:
                name: default
            - name: Bulkhead
              args:
                name: default
            - name: CircuitBreaker
              args:
                name: default
                fallbackUri: forward:/fallback/spozon-backend

        # ------------------------------------------------------------------
        # Route 11: Spozon Backend API Docs (PUBLIC)
        # ------------------------------------------------------------------
        - id: docs_spozon_backend
          uri: lb://SPOZON-BACKEND
          predicates:
            - Path=/gateway-api-docs/spozon-backend
          filters:
            - RewritePath=/gateway-api-docs/spozon-backend, /v3/api-docs

security:
  jwt:
    public-key: ${AUTH_SERVICE_PUBLIC_KEY:}
    issuer: ${SECURITY_JWT_ISSUER:}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO
    io.github.resilience4j: INFO
    io.opentelemetry: DEBUG
  pattern:
    level: "%5p [${spring.application.name:},traceId=%X{traceId:-},spanId=%X{spanId:-}]"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator

  observations:
    key-values:
      service.name: api-gateway
      service.version: 1.0.0
      deployment.environment: ${spring.profiles.active}

  metrics:
    tags:
      application: api-gateway
    enable:
      reactor.netty.http.client: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99

  endpoint:
    health:
      show-details: always

  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: W3C
    enabled: true

  otlp:
    tracing:
      endpoint: http://localhost:4317

gateway:
  rate-limit:
    public-ip: ${GATEWAY_PUBLIC_IP_RATE_LIMIT:50}
    per-user: ${GATEWAY_PER_USER_RATE_LIMIT:200}

ono:
  observability:
    logging:
      enabled: true
    exceptions:
      enabled: false
    performance:
      enabled: true
    metrics:
      serviceName: api-gateway

springdoc:
  swagger-ui:
    path: /api-docs
    disable-swagger-default-url: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
    urls:
      - name: "Gateway Routes"
        url: /swagger.yaml
      - name: "Auth Service"
        url: /gateway-api-docs/auth-service
      - name: "User Service"
        url: /gateway-api-docs/user-service
      - name: "Restaurant Service"
        url: /gateway-api-docs/restaurant-service
      - name: "Order Service"
        url: /gateway-api-docs/order-service
      - name: "Notification Service"
        url: /gateway-api-docs/notification-service
      - name: "Spozon Backend"
        url: /gateway-api-docs/spozon-backend
      - name: "PicklePlay Backend"
        url: /gateway-api-docs/picklplay-backend
    urls-primary-name: "Gateway Routes"
  api-docs:
    enabled: false
  cache:
    disabled: true

# Firebase App Check — leave blank to disable App Check enforcement (dev default)
firebase:
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
  disabled: true
