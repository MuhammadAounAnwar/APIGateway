server:
  port: 8762

spring:
  profiles:
    active: dev
  application:
    name: api-gateway

  config:
    import: optional:file:.env  # loads environment variables from .env

  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION_MS:3600000}

  cloud:
    gateway:
      default-filters:
        # Adds correlation id if missing
        - AddRequestHeader=X-Gateway, API-GATEWAY
        - AddResponseHeader=X-Gateway-Version, v1
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"

      routes:

        # ------------------------------------------------------------------
        # Route 1: Authentication Service (PUBLIC)
        # ------------------------------------------------------------------
        - id: auth_service
          uri: lb://AUTHENTICATION-SERVICE
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /${segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${AUTH_RATE_LIMIT:10}
                redis-rate-limiter.burstCapacity: ${AUTH_BURST_CAPACITY:20}
            - name: Retry
              args:
                name: default
            - name: CircuitBreaker
              args:
                name: default
                fallbackUri: forward:/fallback/auth-service

        # ------------------------------------------------------------------
        # Route 2: User Service (SECURED)
        # ------------------------------------------------------------------
        - id: user_service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /${segment}
            - name: AuthPreFilter
            - name: Retry
              args:
                name: default
            - name: Bulkhead
              args:
                name: default
            - name: CircuitBreaker
              args:
                name: default
                fallbackUri: forward:/fallback/user-service

        # ------------------------------------------------------------------
        # Route 3: Restaurant Service (SECURED)
        # ------------------------------------------------------------------
        - id: restaurant_service
          uri: lb://RESTAURANT-SERVICE
          predicates:
            - Path=/api/restaurants/**
          filters:
            - RewritePath=/api/restaurants/(?<segment>.*), /${segment}
            - name: AuthPreFilter
            - name: Retry
              args:
                name: default
            - name: Bulkhead
              args:
                name: default
            - name: CircuitBreaker
              args:
                name: default
                fallbackUri: forward:/fallback/restaurant-service

        # ------------------------------------------------------------------
        # Route 4: Order Service (SECURED)
        # ------------------------------------------------------------------
        - id: order_service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/orders/**
          filters:
            - RewritePath=/api/orders/(?<segment>.*), /${segment}
            - name: AuthPreFilter
            - name: Retry
              args:
                name: orderStrict
            - name: Bulkhead
              args:
                name: default
            - name: CircuitBreaker
              args:
                name: orderStrict
                fallbackUri: forward:/fallback/order-service

        # ------------------------------------------------------------------
        # Route 5: Notification Service (SECURED)
        # ------------------------------------------------------------------
        - id: notification_service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications/(?<segment>.*), /${segment}
            - name: AuthPreFilter
            - name: Retry
              args:
                name: default
            - name: Bulkhead
              args:
                name: default
            - name: CircuitBreaker
              args:
                name: default
                fallbackUri: forward:/fallback/notification-service

        # ------------------------------------------------------------------
        # Route 6: Email Service (INTERNAL / SECURED)
        # ------------------------------------------------------------------
        - id: email_service
          uri: lb://EMAIL-SERVICE
          predicates:
            - Path=/api/emails/**
          filters:
            - RewritePath=/api/emails/(?<segment>.*), /${segment}
            - name: AuthPreFilter
            - name: Retry
              args:
                name: default
            - name: Bulkhead
              args:
                name: default
            - name: CircuitBreaker
              args:
                name: emailLenient
                fallbackUri: forward:/fallback/email-service

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO
    io.github.resilience4j: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator

  metrics:
    tags:
      application: api-gateway

  endpoint:
    health:
      show-details: always

  tracing:
    sampling:
      probability: 1.0

  otlp:
    tracing:
      endpoint: http://localhost:4317

ono:
  logging:
    exceptions:
      enabled: false
    performance:
      enabled: true
