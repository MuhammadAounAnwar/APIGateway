############################################
# DEV PROFILE CONFIGURATION
############################################

server:
  port: 8762

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

spring:
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 2000ms

  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s

############################################
# RESILIENCE (RELAXED FOR DEV)
############################################

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 70
        slowCallRateThreshold: 70
        slowCallDurationThreshold: 3s
        waitDurationInOpenState: 10s

    instances:
      default:
        baseConfig: default

      orderStrict:
        baseConfig: default
        failureRateThreshold: 50
        waitDurationInOpenState: 15s

      emailLenient:
        baseConfig: default
        failureRateThreshold: 80
        waitDurationInOpenState: 5s

  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms

    instances:
      default:
        baseConfig: default

      orderStrict:
        baseConfig: default
        maxAttempts: 2
        waitDuration: 400ms

      emailLenient:
        baseConfig: default
        maxAttempts: 4
        waitDuration: 600ms

  bulkhead:
    instances:
      default:
        maxConcurrentCalls: 50
        maxWaitDuration: 0

      orderStrict:
        maxConcurrentCalls: 30
        maxWaitDuration: 0

      emailLenient:
        maxConcurrentCalls: 20
        maxWaitDuration: 0

  timelimiter:
    instances:
      default:
        timeoutDuration: 6s
        cancelRunningFuture: true

      orderStrict:
        timeoutDuration: 4s
        cancelRunningFuture: true

      emailLenient:
        timeoutDuration: 8s
        cancelRunningFuture: true

############################################
# OBSERVABILITY (FULL FOR DEV)
############################################

management:
  tracing:
    sampling:
      probability: 1.0   # trace everything in dev

  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always